<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formules Physique-Chimie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚗️</text></svg>">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font-display: 'Playfair Display', serif;
  --font-body: 'DM Sans', sans-serif;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

html[data-force-chrome] {
  --text: #f8f9fa;
  --text-muted: #a0a0b0;
  --highlight: #e94560;
  --highlight-dim: #c73e54;
  --highlight-light: #f06a7d;
  --bg: #1a0f0f;
  --card-bg: rgba(255, 255, 255, 0.05);
  --card-border: rgba(255, 255, 255, 0.08);
  --border: rgba(255, 255, 255, 0.1);
  --bg-hover: rgba(255, 255, 255, 0.08);
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
  --glow: 0 0 15px rgba(233, 69, 96, 0.15);
  --bg-gradient: linear-gradient(135deg, #1a0f0f, #2a1515);
}

html[data-theme="light"]:not([data-force-chrome]) {
  --text: #0f172a;
  --text-muted: #64748b;
  --highlight: #0d9488;
  --highlight-dim: #0f766e;
  --highlight-light: #14b8a6;
  --bg: #f0fdfa;
  --card-bg: rgba(255, 255, 255, 0.95);
  --card-border: rgba(0, 0, 0, 0.06);
  --border: rgba(0, 0, 0, 0.1);
  --bg-hover: rgba(0, 0, 0, 0.04);
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  --glow: 0 0 15px rgba(13, 148, 136, 0.15);
  --bg-gradient: linear-gradient(135deg, #f0fdfa, #eef2ff);
}

html[data-theme="dark"]:not([data-force-chrome]) {
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --highlight: #58a6ff;
  --highlight-dim: #388bfd;
  --highlight-light: #79b8ff;
  --bg: #0d1117;
  --card-bg: rgba(255, 255, 255, 0.03);
  --card-border: rgba(255, 255, 255, 0.06);
  --border: rgba(255, 255, 255, 0.08);
  --bg-hover: rgba(255, 255, 255, 0.06);
  --shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
  --glow: 0 0 15px rgba(88, 166, 255, 0.15);
  --bg-gradient: linear-gradient(135deg, #0d1117, #161b22);
}

body {
  font-family: var(--font-body);
  min-height: 100vh;
  color: var(--text);
  background: var(--bg-gradient);
  transition: background var(--transition), color var(--transition);
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem 1.5rem;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  animation: fadeInDown 0.8s ease-out;
  margin-bottom: 2rem;
}

.header-left { text-align: left; }

.header-left h1 {
  font-family: var(--font-display);
  font-size: 3rem;
  font-weight: 700;
  color: var(--highlight);
  line-height: 1.1;
}

.subtitle {
  font-size: 1rem;
  color: var(--text-muted);
  margin-top: 0.25rem;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-shrink: 0;
  padding-top: 0.35rem;
}

.theme-toggle {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  cursor: pointer;
  user-select: none;
}

.theme-toggle-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
}

.toggle-track {
  width: 42px;
  height: 22px;
  background: var(--bg-hover);
  border-radius: 99px;
  position: relative;
  transition: background var(--transition);
}

.toggle-track.active {
  background: var(--highlight);
}

.toggle-thumb {
  width: 16px;
  height: 16px;
  background: var(--text);
  border-radius: 50%;
  position: absolute;
  top: 2px;
  left: 3px;
  transition: transform var(--transition);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}

.toggle-track.active .toggle-thumb {
  transform: translateX(20px);
}

html[data-force-chrome] .theme-toggle {
  display: none;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
  animation: fadeInUp 0.8s ease-out 0.15s backwards;
}

.filter-pill {
  padding: 0.5rem 1rem;
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 99px;
  color: var(--text-muted);
  font-family: var(--font-body);
  font-size: 0.8rem;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.filter-pill:hover {
  border-color: var(--highlight);
  color: var(--text);
  transform: translateY(-1px);
}

.filter-pill.active {
  background: var(--highlight);
  color: white;
  border-color: var(--highlight);
}

.stats {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
  padding: 2rem 0;
  margin-bottom: 1.5rem;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  animation: fadeInUp 0.8s ease-out 0.2s backwards;
}

.stat-item {
  text-align: center;
}

.stat-value {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--highlight);
  display: block;
}

.stat-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.25rem;
}

.card {
  background: var(--card-bg);
  backdrop-filter: blur(10px);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 1.5rem;
  animation: fadeSlideIn 0.4s ease;
  transition: all 0.3s ease;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.card:hover {
  transform: translateY(-5px);
  border-color: var(--highlight);
  box-shadow: var(--shadow), var(--glow);
}

.card.hidden {
  display: none;
}

.card-chapter {
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--highlight);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.card-name {
  font-family: var(--font-display);
  font-size: 1.15rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
}

.card-formula {
  text-align: center;
  font-size: 1.3rem;
  padding: 1rem 0;
  overflow-x: auto;
}

.card-details {
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.card-detail {
  font-size: 0.8rem;
  color: var(--text-muted);
  line-height: 1.4;
}

.card-detail strong {
  color: var(--text);
  font-weight: 600;
  margin-right: 0.25rem;
}

.loading {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}

.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--highlight);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

.csv-fallback {
  grid-column: 1 / -1;
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.upload-btn {
  display: inline-block;
  background: var(--highlight);
  color: white;
  padding: 15px 40px;
  border-radius: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 1.1rem;
  border: none;
  font-family: var(--font-body);
}

.upload-btn:hover {
  background: var(--highlight-dim);
  transform: translateY(-2px);
  box-shadow: 0 5px 20px var(--shadow);
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 3rem;
  color: var(--text-muted);
  font-size: 1.1rem;
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 560px) {
  .container { padding: 1.25rem 1rem; }
  .header-left h1 { font-size: 2rem; }
  header { flex-direction: column; gap: 1rem; }
  .header-right { align-self: flex-end; }
  .grid { grid-template-columns: 1fr; }
  .stats { gap: 20px; }
  .stat-value { font-size: 2rem; }
  .card { padding: 1.25rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-left">
      <h1>Formules</h1>
      <p class="subtitle">Physique-Chimie — Lycée</p>
    </div>
    <div class="header-right">
      <label class="theme-toggle" id="themeToggle">
        <span class="theme-toggle-label" id="themeLabel">Nuit</span>
        <div class="toggle-track" id="toggleTrack">
          <div class="toggle-thumb"></div>
        </div>
      </label>
    </div>
  </header>

  <div class="filters" id="filters"></div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat-item">
      <span class="stat-value" id="statTotal">0</span>
      <span class="stat-label">Formules</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statChapters">0</span>
      <span class="stat-label">Chapitres</span>
    </div>
    <div class="stat-item">
      <span class="stat-value" id="statShown">0</span>
      <span class="stat-label">Affichées</span>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="loading-spinner"></div>
    <p>Chargement…</p>
  </div>

  <div class="csv-fallback" id="csvFallback">
    <label for="csvFile" class="upload-btn">📁 Charger le fichier CSV</label>
    <input type="file" id="csvFile" accept=".csv" style="display:none;" />
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
MathJax = {
  tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$'], ['\\[', '\\]']] },
  svg: { fontCache: 'global' }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script>
(function() {
  var isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
  if (isChrome) {
    document.documentElement.setAttribute('data-force-chrome', '');
  } else {
    var saved = localStorage.getItem('fpc-theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    updateToggleUI(saved);
  }

  function updateToggleUI(theme) {
    var track = document.getElementById('toggleTrack');
    var label = document.getElementById('themeLabel');
    if (!track || !label) return;
    if (theme === 'dark') {
      track.classList.add('active');
      label.textContent = 'Jour';
    } else {
      track.classList.remove('active');
      label.textContent = 'Nuit';
    }
  }

  var toggle = document.getElementById('themeToggle');
  if (toggle) {
    toggle.addEventListener('click', function() {
      if (isChrome) return;
      var current = document.documentElement.getAttribute('data-theme');
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('fpc-theme', next);
      updateToggleUI(next);
    });
  }

  var allData = [];
  var chapters = [];

  function parseCSV(text) {
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var data = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = [];
      var inQuote = false, inMath = false, cur = '';
      for (var j = 0; j < lines[i].length; j++) {
        var c = lines[i][j];
        if (c === '"') {
          if (inQuote && lines[i][j+1] === '"') { cur += '"'; j++; }
          else inQuote = !inQuote;
        } else if (c === ';' && !inQuote && !inMath) {
          cols.push(cur); cur = '';
        } else cur += c;
        if (c === '$' && !inQuote) inMath = !inMath;
      }
      cols.push(cur);
      if (cols.length >= 5) {
        data.push({
          chapter: cols[0].trim(),
          name: cols[1].trim(),
          formula: cols[2].trim(),
          notations: cols[3].trim(),
          units: cols[4].trim()
        });
      }
    }
    return data;
  }

  function getChapters(data) {
    var map = {};
    for (var i = 0; i < data.length; i++) {
      map[data[i].chapter] = true;
    }
    return Object.keys(map).sort();
  }

  function renderFilters() {
    var container = document.getElementById('filters');
    container.innerHTML = '';
    var all = document.createElement('button');
    all.className = 'filter-pill active';
    all.textContent = '📋 Tous';
    all.dataset.chapter = '';
    container.appendChild(all);
    for (var i = 0; i < chapters.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'filter-pill';
      btn.textContent = chapters[i];
      btn.dataset.chapter = chapters[i];
      container.appendChild(btn);
    }
    container.addEventListener('click', function(e) {
      var pill = e.target.closest('.filter-pill');
      if (!pill) return;
      container.querySelectorAll('.filter-pill').forEach(function(p) { p.classList.remove('active'); });
      pill.classList.add('active');
      filterCards(pill.dataset.chapter);
    });
  }

  function filterCards(chapter) {
    var cards = document.querySelectorAll('.card');
    var shown = 0;
    cards.forEach(function(card) {
      if (!chapter || card.dataset.chapter === chapter) {
        card.classList.remove('hidden');
        shown++;
      } else {
        card.classList.add('hidden');
      }
    });
    document.getElementById('statShown').textContent = shown;
  }

  function renderCards(data) {
    var grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (var i = 0; i < data.length; i++) {
      var d = data[i];
      var card = document.createElement('div');
      card.className = 'card';
      card.dataset.chapter = d.chapter;
      var chapterHtml = '<div class="card-chapter">📘 ' + escapeHtml(d.chapter) + '</div>';
      var nameHtml = '<div class="card-name">' + escapeHtml(d.name) + '</div>';
      var formulaDisplay = d.formula.replace(/\$([\s\S]*?)\$/g, function(_, inner) {
        return '$$' + inner + '$$';
      });
      var formulaHtml = '<div class="card-formula">' + formulaDisplay + '</div>';
      var detailsHtml = '<div class="card-details">';
      if (d.notations && d.notations !== '—') {
        detailsHtml += '<div class="card-detail"><strong>📝</strong> ' + escapeHtml(d.notations) + '</div>';
      }
      if (d.units && d.units !== '—') {
        detailsHtml += '<div class="card-detail"><strong>📏</strong> ' + escapeHtml(d.units) + '</div>';
      }
      detailsHtml += '</div>';
      card.innerHTML = chapterHtml + nameHtml + formulaHtml + detailsHtml;
      grid.appendChild(card);
    }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function onDataReady() {
    chapters = getChapters(allData);
    renderFilters();
    renderCards(allData);
    document.getElementById('stats').style.display = 'flex';
    document.getElementById('statTotal').textContent = allData.length;
    document.getElementById('statChapters').textContent = chapters.length;
    document.getElementById('statShown').textContent = allData.length;
    document.getElementById('loading').style.display = 'none';
    if (MathJax && MathJax.typesetPromise) {
      MathJax.typesetPromise();
    }
  }

  document.getElementById('csvFile').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(event) {
      allData = parseCSV(event.target.result);
      document.getElementById('csvFallback').style.display = 'none';
      onDataReady();
    };
    reader.readAsText(file);
  });

  fetch('formules.csv')
    .then(function(response) {
      if (!response.ok) throw new Error('Fetch failed');
      return response.text();
    })
    .then(function(csvData) {
      allData = parseCSV(csvData);
      onDataReady();
    })
    .catch(function() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('csvFallback').style.display = 'flex';
    });
})();
</script>
</body>
</html>
